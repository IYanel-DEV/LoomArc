<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoomArc — Minecraft Network Panel</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="3" width="7" height="7" rx="1"/><rect x="15" y="3" width="7" height="7" rx="1"/>
      <rect x="2" y="14" width="7" height="7" rx="1"/><rect x="15" y="14" width="7" height="7" rx="1"/>
    </svg>
    <span class="logo-text">LoomArc</span>
  </div>

  <nav class="sidebar-nav">
    <a href="#/" class="nav-link" data-page="dashboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Dashboard
    </a>
    <a href="#/plugins" class="nav-link" data-page="plugins">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Plugin Browser
    </a>
    <a href="#/system" class="nav-link" data-page="system">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14"/><path d="M4.93 19.07a10 10 0 010-14.14"/></svg>
      System
    </a>
  </nav>

  <div class="sidebar-footer">
    <span id="panel-version" class="version-badge"></span>
  </div>
</aside>

<!-- ── Main content ──────────────────────────────────────────────────────── -->
<main class="main-content">
  <div id="page-container">
    <!-- Pages are rendered here by app.js -->
    <div class="loading-splash">
      <div class="spinner"></div>
      <p>Loading LoomArc…</p>
    </div>
  </div>
</main>

<!-- ── Toast container ───────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ── Global modal ──────────────────────────────────────────────────────── -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <h3 id="modal-title"></h3>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script type="module" src="/js/app.js"></script>
</body>
</html>
